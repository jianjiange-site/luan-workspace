spring:
  application:
    name: dating-post-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-init-sql: SET TIME ZONE 'UTC'
  data:
    redis:
      timeout: 3s
      database: 1
  cloud:
    nacos:
      discovery:
        group: DEFAULT_GROUP
      config:
        group: DEFAULT_GROUP
        file-extension: yaml
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_history_post

server:
  port: ${SERVER_PORT:8080}

grpc:
  server:
    port: ${GRPC_PORT:9090}
  client:
    user-service:
      address: discovery:///user-service
      negotiation-type: plaintext

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.dating.post.entity
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:38.76.188.242:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:youjianxin-dating-dev-post-service-producer}
    access-key: ${ROCKETMQ_ACCESS_KEY}
    secret-key: ${ROCKETMQ_SECRET_KEY}
    send-message-timeout: 3000

app:
  cache:
    key-prefix: ${REDIS_KEY_PREFIX:luan}
  snowflake:
    worker-id: ${SNOWFLAKE_WORKER_ID:1}
  feed:
    recommend-pool-size: 3000
    cold-start-pool-size: 10000
    timeline-max-size: 100
    bloom-capacity: 5000
    bloom-fpp: 0.01
    recommend-page-size: 30
    friend-fetch-size: 5
    cold-start-fetch-size: 10

dating:
  object-storage:
    provider: s3
    endpoint: ${MINIO_ENDPOINT:https://minio-api.jianjiange.site}
    region: us-east-1
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    path-style-access: true
    bucket: ${MINIO_BUCKET:dating-luan}

logging:
  level:
    com.dating.post: DEBUG
    org.apache.rocketmq: WARN
